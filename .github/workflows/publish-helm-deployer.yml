name: Publish Helm Deployer

on:
  push:
    branches: [main]
    paths:
      - "helm-deployer/Dockerfile"
      - "helm-deployer/helm-chart/**"
      - "helm-deployer/index.mjs"
      - "helm-deployer/package.json"
      - ".github/workflows/publish-helm-deployer.yml"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: publish-helm-deployer-${{ github.ref }}
  cancel-in-progress: false # Don't cancel in-flight publishes

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - name: Check if secrets are configured
        id: check
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && [ -n "${{ secrets.ECR_REGISTRY_ALIAS }}" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            echo "::notice::ECR publish skipped - AWS secrets or ECR_REGISTRY_ALIAS not configured. See docs/GETTING_STARTED.md for setup instructions."
          fi

  publish:
    name: Build & Push to ECR Public
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-secrets == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Public ECR is only available in us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-public-login-action@v1
        with:
          registry-alias: ${{ secrets.ECR_REGISTRY_ALIAS }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./helm-deployer
          push: true
          tags: |
            public.ecr.aws/${{ secrets.ECR_REGISTRY_ALIAS }}/helm-deployer:latest
            public.ecr.aws/${{ secrets.ECR_REGISTRY_ALIAS }}/helm-deployer:${{ github.sha }}
