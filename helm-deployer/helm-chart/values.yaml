# Open-Inspect Sandbox Helm Chart Values
nodeSelector:
  kubernetes.io/arch: amd64
# -- Sandbox environment TTL (cleanup after this duration)
sandboxTtlSeconds: 86400 # 24 hours

# -- Namespace for sandbox releases
namespace: open-inspect

# -- Sandbox (combined image with OpenCode, bridge, and reverse proxy)
sandboxImage:
  # The combined Debian-based image for the sandbox
  repository: "public.ecr.aws/x5s6v8v4/opencode-sandbox"
  tag: "v3"
  # Ports used by the sandbox services
  opencodePort: 4096
  proxyPort: 3000
  resources:
    requests:
      cpu: "800m"
      memory: "1.5Gi"
    limits:
      cpu: "2.5"
      memory: "6Gi"
# -- API keys (set via secrets)
anthropicApiKey: ""

# -- Sandbox metadata/config (typically overridden per release)
sandbox:
  sandboxId: ""
  sessionId: ""
  controlPlaneUrl: ""
  repoOwner: ""
  repoName: ""
  provider: ""
  model: ""
  branch: ""
  agent: ""
  sandboxAuthToken: ""
  userEnvVars: {}

# -- Git/VCS config (typically overridden per release)
git:
  cloneToken: ""
  vcsHost: ""
  vcsCloneUsername: ""
