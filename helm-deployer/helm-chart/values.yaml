# Open-Inspect Sandbox Helm Chart Values
nodeSelector:
  kubernetes.io/arch: amd64
# -- Sandbox environment TTL (cleanup after this duration)
sandboxTtlSeconds: 86400 # 24 hours

# -- Namespace for sandbox releases
namespace: open-inspect

# -- Sandbox (combined image with OpenCode, bridge, and reverse proxy)
sandboxImage:
  # The combined Debian-based image for the sandbox
  repository: "public.ecr.aws/x5s6v8v4/opencode-sandbox"
  tag: "v1"
  # Ports used by the sandbox services
  opencodePort: 4096
  proxyPort: 3000
  resources:
    requests:
      cpu: "800m"
      memory: "1.5Gi"
    limits:
      cpu: "2.5"
      memory: "6Gi"

# -- Browser for MCP (Playwright/Chromium)
browser:
  image: mcr.microsoft.com/playwright:v1.49.0-noble
  port: 9222
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

# -- ttyd for terminal streaming in browser
ttyd:
  image: tsl0922/ttyd@sha256:6609dc1715ea39b331d1f5c8840abb84fcea2992f0b7e7cf55664fe318479752
  port: 7681
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"


# -- MongoDB (Atlas local — same image pinned in compose.local.yml)
mongodb:
  image: "mongodb/mongodb-atlas-local@sha256:52cb0efa52ab6d498708f6078eb01aee813495ecb972dfd95d22c599ec9b30c6"
  port: 27017
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# -- Jaeger (all-in-one, v2.x with OTLP)
jaeger:
  image: public.ecr.aws/bitnami/jaeger:2
  ports:
    ui: 16686
    otlpGrpc: 4317
    otlpHttp: 4318
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# -- RedPanda (Kafka-compatible)
redpanda:
  image: docker.redpanda.com/redpandadata/redpanda:v24.3.18
  ports:
    kafka: 9092
    admin: 9644
    schemaRegistry: 8081
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# -- RedPanda Console
redpandaConsole:
  image: docker.redpanda.com/redpandadata/console:v3.1.2
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# -- RabbitMQ (with delayed-message-exchange plugin, matches compose.premise.yml)
rabbitmq:
  image: heidiks/rabbitmq-delayed-message-exchange:4.0.2-management
  ports:
    amqp: 5672
    management: 15672
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# -- Maildev
maildev:
  image: maildev/maildev@sha256:180ef51f65eefebb0e7122d8308813c1fd7bff164bc440ce5a3c2feee167a810
  ports:
    smtp: 1025
    web: 1080
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# -- MinIO
minio:
  image: public.ecr.aws/bitnami/minio:2023-debian-11
  ports:
    api: 9000
    console: 9001
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  accessKey: minio
  secretKey: minio123

# -- Redis
redis:
  image: public.ecr.aws/docker/library/redis:7
  port: 6379
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# -- Prometheus (matches compose.tracing.yml)
prometheus:
  image: public.ecr.aws/bitnami/prometheus:latest
  port: 9090
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# -- Kafka Connect
kafkaConnect:
  image: confluentinc/cp-kafka-connect:7.7.1
  port: 8083
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# -- Cloudflare Tunnel
cloudflareTunnel:
  image: cloudflare/cloudflared:latest
  # Set via environment/secrets at deploy time
  tunnelToken: ""

# -- Sandbox configuration (passed from control plane)
sandbox:
  controlPlaneUrl: ""
  sandboxAuthToken: ""
  sandboxId: ""
  sessionId: ""
  repoOwner: ""
  repoName: ""
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  branch: "main"
  agent: ""
  # User-defined environment variables
  userEnvVars: {}

# -- Git configuration
git:
  cloneToken: ""
  vcsHost: "github.com"
  vcsCloneUsername: "x-access-token"

# -- Ingress configuration for external access via numbered subdomains (env-NNNN.baseDomain)
ingress:
  enabled: false
  # Ingress class name (e.g. nginx, traefik). Omit to use cluster default.
  className: ""
  # Base domain for environment subdomains.
  # Example: baseDomain=sandbox.example.com → host env-0042.sandbox.example.com
  baseDomain: ""
  # 4-digit zero-padded environment number (0000–9999), assigned by helm-deployer.
  envNumber: ""
  # Extra annotations to add to the Ingress resource.
  annotations: {}
  tls:
    enabled: false
    # TLS secret name. Defaults to env-<envNumber>-tls when omitted.
    secretName: ""

# -- API keys (set via secrets)
anthropicApiKey: ""
