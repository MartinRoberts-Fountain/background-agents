apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sandbox.fullname" . }}-secrets
  labels:
    {{- include "sandbox.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.anthropicApiKey | quote }}
  SANDBOX_AUTH_TOKEN: {{ .Values.sandbox.sandboxAuthToken | quote }}
  VCS_CLONE_TOKEN: {{ .Values.git.cloneToken | quote }}
  {{- if .Values.git.cloneToken }}
  GITHUB_APP_TOKEN: {{ .Values.git.cloneToken | quote }}
  GITHUB_TOKEN: {{ .Values.git.cloneToken | quote }}
  GH_TOKEN: {{ .Values.git.cloneToken | quote }}
  {{- end }}
  {{- range $key, $value := .Values.sandbox.userEnvVars }}
  {{- if and (ne $key "ANTHROPIC_API_KEY") (ne $key "SANDBOX_AUTH_TOKEN") (ne $key "VCS_CLONE_TOKEN") (ne $key "GITHUB_APP_TOKEN") (ne $key "GITHUB_TOKEN") (ne $key "GH_TOKEN") }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}