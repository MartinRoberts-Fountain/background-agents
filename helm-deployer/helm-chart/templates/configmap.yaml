apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sandbox.fullname" . }}-config
  labels:
    {{- include "sandbox.labels" . | nindent 4 }}
data:
  SANDBOX_ID: {{ .Values.sandbox.sandboxId | quote }}
  SESSION_ID: {{ .Values.sandbox.sessionId | quote }}
  CONTROL_PLANE_URL: {{ .Values.sandbox.controlPlaneUrl | quote }}
  REPO_OWNER: {{ .Values.sandbox.repoOwner | quote }}
  REPO_NAME: {{ .Values.sandbox.repoName | quote }}
  PROVIDER: {{ .Values.sandbox.provider | quote }}
  MODEL: {{ .Values.sandbox.model | quote }}
  BRANCH: {{ .Values.sandbox.branch | quote }}
  SESSION_CONFIG: {{ dict "session_id" .Values.sandbox.sessionId "repo_owner" .Values.sandbox.repoOwner "repo_name" .Values.sandbox.repoName "branch" .Values.sandbox.branch "provider" .Values.sandbox.provider "model" .Values.sandbox.model "agent" .Values.sandbox.agent | toJson | quote }}
  VCS_HOST: {{ .Values.git.vcsHost | quote }}
  VCS_CLONE_USERNAME: {{ .Values.git.vcsCloneUsername | quote }}
  OPENCODE_PORT: {{ .Values.sandboxImage.opencodePort | quote }}
  REDIS_URL: "redis://localhost:{{ .Values.redis.port }}"
  MONGODB_URL: "mongodb://localhost:{{ .Values.mongodb.port }}"
  RABBITMQ_URL: "amqp://guest:guest@localhost:{{ .Values.rabbitmq.ports.amqp }}"
  KAFKA_BROKER: "localhost:{{ .Values.redpanda.ports.kafka }}"
  MINIO_ENDPOINT: "http://localhost:{{ .Values.minio.ports.api }}"
  JAEGER_ENDPOINT: "http://localhost:{{ .Values.jaeger.ports.otlpHttp }}"
  MAILDEV_SMTP: "localhost:{{ .Values.maildev.ports.smtp }}"
  SANDBOX_TTL_SECONDS: {{ .Values.sandboxTtlSeconds | quote }}

  # ---- wx-system runtime environment ----
  # Node.js
  NODE_ENV: "dev"
  STAGE: "local"
  LOG_LEVEL: "debug"
  TZ: "UTC"
  DEPLOYMENT_TYPE: "local"

  # MongoDB — individual vars the wx-system services read
  # MONGODB_REPLICA_SET is injected per-pod via the Downward API (metadata.name)
  MONGODB_HOST: "localhost"
  MONGODB_PORT: {{ .Values.mongodb.port | quote }}
  MONGODB_DEFAULT_TIMEOUT_MS: "10000"
  MONGOOSE_DEBUG: "false"

  # Redis
  REDIS_HOST: "localhost"
  REDIS_PORT: {{ .Values.redis.port | quote }}
  REDIS_POOL_LOCAL_ENABLED: "true"
  REDIS_POOL_LOCAL_CONN_MIN: "2"
  REDIS_POOL_LOCAL_CONN_MAX: "5"
  REDIS_POOL_LOCAL_TEST_ON_BORROW: "false"

  # RabbitMQ / AMQP
  AMQP_HOST: "localhost"
  AMQP_PORT: {{ .Values.rabbitmq.ports.amqp | quote }}
  AMQP_USERNAME: "guest"
  AMQP_PASSWORD: "guest"
  MESSAGING_PLATFORM: "AMQP"
  MOM_FS_MODE: "false"
  REACTIVE_ERROR_POLICY: "requeue"
  RABBITMQ_MGMT_URL: "http://guest:guest@localhost:{{ .Values.rabbitmq.ports.management }}"

  # Kafka (Redpanda) — wx-system uses KAFKA_BROKERS (plural)
  KAFKA_BROKERS: "localhost:{{ .Values.redpanda.ports.kafka }}"
  KAFKA_APPLICANT_ACTIVITY_TOPICS: "ApplicantActivity"

  # MinIO — wx-system uses hostname-only MINIO_ENDPOINT + separate port/ssl
  MINIO_HOST: "localhost"
  MINIO_PORT: {{ .Values.minio.ports.api | quote }}
  MINIO_SSL: "0"
  FILE_PLATFORM: "MINIO"
  FILE_REGION: "us-east-1"
  ASSETS_BUCKET: "wx-file-upload-local"
  LOGGER_BUCKET: "wx-logger-local"
  MOM_BUCKET: "wx-mom-local"
  HTTP_BUCKET: "wx-http-local"
  MINIO_BUCKET_NAME: "automations-sink-local"
  MINIO_AMQP_EXCHANGE_NAME: "minio-events-local"
  MINIO_AMQP_EXCHANGE_TYPE: "topic"
  MINIO_AMQP_ROUTING_KEY: "wx-service-integrations-reactive-local"
  MINIO_AMQP_ROUTING_KEY_PATTERN: "#"
  MINIO_AMQP_DURABLE: "on"

  # Maildev — wx-system reads these separately
  MAILDEV_SMTP_HOST: "localhost"
  MAILDEV_SMTP_PORT: {{ .Values.maildev.ports.smtp | quote }}
  MAILDEV_WEB_PORT: {{ .Values.maildev.ports.web | quote }}
  MESSAGING_SENDER_MAIL: "maildev"
  MESSAGING_SENDER_SMS: "console"
  MESSAGING_SENDER_WHATSAPP: "console"

  # Observability / Tracing
  TRACELOOP_BASE_URL: "http://localhost:{{ .Values.jaeger.ports.otlpHttp }}"
