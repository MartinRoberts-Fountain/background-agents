apiVersion: v1
kind: Pod
metadata:
  name: {{ include "sandbox.fullname" . }}
  labels:
    {{- include "sandbox.labels" . | nindent 4 }}
  annotations:
    # TTL-based cleanup: pod will be cleaned up after sandboxTtlSeconds
    open-inspect/created-at: {{ now | date "2006-01-02T15:04:05Z" | quote }}
    open-inspect/ttl-seconds: {{ .Values.sandboxTtlSeconds | quote }}
spec:
  # Auto-terminate after TTL expires (activeDeadlineSeconds enforces hard limit)
  activeDeadlineSeconds: {{ .Values.sandboxTtlSeconds }}
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
  {{- with .Values.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  volumes:
    - name: workspace
      emptyDir: {}
    - name: shared-tmp
      emptyDir: {}
    - name: bridge-runtime
      configMap:
        name: {{ include "sandbox.fullname" . }}-bridge
    - name: mongodb-data
      emptyDir: {}
    - name: redis-data
      emptyDir: {}
    - name: minio-data
      emptyDir: {}
    - name: redpanda-data
      emptyDir: {}
    - name: rabbitmq-data
      emptyDir: {}

  containers:
    # ========================================
    # Combined Sandbox Image
    # (OpenCode, Python Bridge, Reverse Proxy)
    # ========================================
    - name: sandbox
      image: "{{ .Values.sandboxImage.repository }}:{{ .Values.sandboxImage.tag }}"
      ports:
        - name: opencode
          containerPort: {{ .Values.sandboxImage.opencodePort }}
        - name: proxy
          containerPort: {{ .Values.sandboxImage.proxyPort }}
      envFrom:
        - configMapRef:
            name: {{ include "sandbox.fullname" . }}-config
        - secretRef:
            name: {{ include "sandbox.fullname" . }}-secrets
      env:
        - name: OPENCODE_PORT
          value: {{ .Values.sandboxImage.opencodePort | quote }}
        - name: PROXY_PORT
          value: {{ .Values.sandboxImage.proxyPort | quote }}
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONPATH
          value: "/app"
        - name: SESSION_CONFIG
          value: |
            {
              "session_id": "{{ .Values.sandbox.sessionId }}",
              "provider": "{{ .Values.sandbox.provider }}",
              "model": "{{ .Values.sandbox.model }}",
              "branch": "{{ .Values.sandbox.branch }}"
            }
        # MongoDB Atlas Local uses the pod name as its replica-set name.
        # Inject it here so wx-system can build the correct connection string.
        - name: MONGODB_REPLICA_SET
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
      volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: shared-tmp
          mountPath: /tmp/shared
        - name: bridge-runtime
          mountPath: /app/sandbox
          readOnly: true
      resources:
        {{- toYaml .Values.sandboxImage.resources | nindent 8 }}
      readinessProbe:
        httpGet:
          path: /health
          port: {{ .Values.sandboxImage.proxyPort }}
        initialDelaySeconds: 15
        periodSeconds: 5

    # ========================================
    # Browser for MCP (Playwright/Chromium)
    # ========================================
    - name: browser
      image: {{ .Values.browser.image }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          exec npx playwright run-server \
            --host 0.0.0.0 \
            --port {{ .Values.browser.port }}
      ports:
        - name: browser
          containerPort: {{ .Values.browser.port }}
      resources:
        {{- toYaml .Values.browser.resources | nindent 8 }}

    # ========================================
    # ttyd — Terminal streaming in browser
    # ========================================
    - name: ttyd
      image: {{ .Values.ttyd.image }}
      command: ["ttyd"]
      args:
        - "--port"
        - {{ .Values.ttyd.port | quote }}
        - "--writable"
        - "--base-path"
        - "/terminal"
        - "sh"
      ports:
        - name: ttyd
          containerPort: {{ .Values.ttyd.port }}
      volumeMounts:
        - name: workspace
          mountPath: /workspace
      resources:
        {{- toYaml .Values.ttyd.resources | nindent 8 }}

    # ========================================
    # MongoDB
    # ========================================
    - name: mongodb
      image: {{ .Values.mongodb.image }}
      env:
        - name: MONGODB_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "sandbox.fullname" . }}-secrets
              key: MONGODB_ROOT_USERNAME
        - name: MONGODB_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "sandbox.fullname" . }}-secrets
              key: MONGODB_ROOT_PASSWORD
      # Reconfigure the replica-set member hostname to localhost:27017 so all
      # containers in the pod can connect via localhost.  The Atlas-local image
      # initialises the RS with the pod hostname, which is not resolvable inside
      # the pod network namespace.
      lifecycle:
        postStart:
          exec:
            command:
              - /bin/sh
              - -c
              - |
                until mongosh --quiet --eval "db.adminCommand('ping')" >/dev/null 2>&1; do sleep 1; done
                mongosh --quiet --eval "try { var c = rs.conf(); c.members[0].host = 'localhost:27017'; rs.reconfig(c, {force:true}); } catch(e) { print(e); }" || true
      ports:
        - name: mongodb
          containerPort: {{ .Values.mongodb.port }}
      volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
      resources:
        {{- toYaml .Values.mongodb.resources | nindent 8 }}

    # ========================================
    # Jaeger (v2.x all-in-one with OTLP)
    # ========================================
    - name: jaeger
      image: {{ .Values.jaeger.image }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          cat > /tmp/jaeger-config.yml << 'EOF'
          service:
            extensions: [jaeger_storage, jaeger_query]
            pipelines:
              traces:
                receivers: [otlp]
                processors: [batch]
                exporters: [jaeger_storage_exporter]
          extensions:
            jaeger_storage:
              backends:
                mem_store:
                  memory:
                    max_traces: 100000
            jaeger_query:
              storage:
                traces: mem_store
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:{{ .Values.jaeger.ports.otlpGrpc }}
                http:
                  endpoint: 0.0.0.0:{{ .Values.jaeger.ports.otlpHttp }}
          processors:
            batch:
          exporters:
            jaeger_storage_exporter:
              trace_storage: mem_store
          EOF
          exec jaeger --config /tmp/jaeger-config.yml
      ports:
        - name: jaeger-ui
          containerPort: {{ .Values.jaeger.ports.ui }}
        - name: otlp-grpc
          containerPort: {{ .Values.jaeger.ports.otlpGrpc }}
        - name: otlp-http
          containerPort: {{ .Values.jaeger.ports.otlpHttp }}
      resources:
        {{- toYaml .Values.jaeger.resources | nindent 8 }}

    # ========================================
    # RedPanda (Kafka-compatible)
    # ========================================
    - name: redpanda
      image: {{ .Values.redpanda.image }}
      command: ["rpk"]
      args:
        - "redpanda"
        - "start"
        - "--smp=1"
        - "--memory=256M"
        - "--reserve-memory=0M"
        - "--overprovisioned"
        - "--kafka-addr=0.0.0.0:{{ .Values.redpanda.ports.kafka }}"
        - "--advertise-kafka-addr=localhost:{{ .Values.redpanda.ports.kafka }}"
        - "--pandaproxy-addr=0.0.0.0:8082"
        - "--advertise-pandaproxy-addr=localhost:8082"
        - "--schema-registry-addr=0.0.0.0:{{ .Values.redpanda.ports.schemaRegistry }}"
      ports:
        - name: kafka
          containerPort: {{ .Values.redpanda.ports.kafka }}
        - name: rp-admin
          containerPort: {{ .Values.redpanda.ports.admin }}
        - name: schema-reg
          containerPort: {{ .Values.redpanda.ports.schemaRegistry }}
      volumeMounts:
        - name: redpanda-data
          mountPath: /var/lib/redpanda/data
      resources:
        {{- toYaml .Values.redpanda.resources | nindent 8 }}

    # ========================================
    # RedPanda Console
    # ========================================
    - name: redpanda-console
      image: {{ .Values.redpandaConsole.image }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "$CONSOLE_CONFIG_FILE" > /tmp/config.yml
          exec /app/console
      ports:
        - name: rp-console
          containerPort: {{ .Values.redpandaConsole.port }}
      env:
        - name: CONSOLE_DISABLE_ENTERPRISE
          value: "true"
        - name: CONFIG_FILEPATH
          value: /tmp/config.yml
        - name: CONSOLE_CONFIG_FILE
          value: |
            kafka:
              brokers: ["localhost:{{ .Values.redpanda.ports.kafka }}"]
            schemaRegistry:
              enabled: true
              urls: ["http://localhost:{{ .Values.redpanda.ports.schemaRegistry }}"]
            kafkaConnect:
              enabled: true
              clusters:
                - name: sandbox-connect
                  url: http://localhost:{{ .Values.kafkaConnect.port }}
                  tls:
                    enabled: false
      resources:
        {{- toYaml .Values.redpandaConsole.resources | nindent 8 }}

    # ========================================
    # RabbitMQ
    # ========================================
    - name: rabbitmq
      image: {{ .Values.rabbitmq.image }}
      ports:
        - name: amqp
          containerPort: {{ .Values.rabbitmq.ports.amqp }}
        - name: rabbitmq-mgmt
          containerPort: {{ .Values.rabbitmq.ports.management }}
      volumeMounts:
        - name: rabbitmq-data
          mountPath: /var/lib/rabbitmq
      resources:
        {{- toYaml .Values.rabbitmq.resources | nindent 8 }}

    # ========================================
    # Maildev
    # ========================================
    - name: maildev
      image: {{ .Values.maildev.image }}
      ports:
        - name: smtp
          containerPort: {{ .Values.maildev.ports.smtp }}
        - name: maildev-web
          containerPort: {{ .Values.maildev.ports.web }}
      resources:
        {{- toYaml .Values.maildev.resources | nindent 8 }}

    # ========================================
    # MinIO
    # ========================================
    - name: minio
      image: {{ .Values.minio.image }}
      command: ["minio"]
      args: ["server", "/data", "--console-address", ":{{ .Values.minio.ports.console }}"]
      ports:
        - name: minio-api
          containerPort: {{ .Values.minio.ports.api }}
        - name: minio-console
          containerPort: {{ .Values.minio.ports.console }}
      env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "sandbox.fullname" . }}-secrets
              key: MINIO_ACCESS_KEY
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "sandbox.fullname" . }}-secrets
              key: MINIO_SECRET_KEY
      volumeMounts:
        - name: minio-data
          mountPath: /data
      resources:
        {{- toYaml .Values.minio.resources | nindent 8 }}

    # ========================================
    # Redis
    # ========================================
    - name: redis
      image: {{ .Values.redis.image }}
      ports:
        - name: redis
          containerPort: {{ .Values.redis.port }}
      volumeMounts:
        - name: redis-data
          mountPath: /data
      resources:
        {{- toYaml .Values.redis.resources | nindent 8 }}

    # ========================================
    # Kafka Connect
    # ========================================
    - name: kafka-connect
      image: {{ .Values.kafkaConnect.image }}
      ports:
        - name: kafka-connect
          containerPort: {{ .Values.kafkaConnect.port }}
      env:
        - name: KAFKA_HEAP_OPTS
          value: "-Xms256M -Xmx512M"
        - name: CONNECT_BOOTSTRAP_SERVERS
          value: "localhost:{{ .Values.redpanda.ports.kafka }}"
        - name: CONNECT_REST_PORT
          value: {{ .Values.kafkaConnect.port | quote }}
        - name: CONNECT_GROUP_ID
          value: "sandbox-connect"
        - name: CONNECT_CONFIG_STORAGE_TOPIC
          value: "connect-configs"
        - name: CONNECT_OFFSET_STORAGE_TOPIC
          value: "connect-offsets"
        - name: CONNECT_STATUS_STORAGE_TOPIC
          value: "connect-status"
        - name: CONNECT_KEY_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: CONNECT_VALUE_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: CONNECT_REST_ADVERTISED_HOST_NAME
          value: "localhost"
        - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
          value: "1"
      resources:
        {{- toYaml .Values.kafkaConnect.resources | nindent 8 }}

    # ========================================
    # Prometheus
    # ========================================
    - name: prometheus
      image: {{ .Values.prometheus.image }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          cat > /tmp/prometheus.yml << 'EOF'
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: prometheus
              static_configs:
                - targets: ['localhost:{{ .Values.prometheus.port }}']
          EOF
          exec /opt/bitnami/prometheus/bin/prometheus \
            --config.file=/tmp/prometheus.yml \
            --storage.tsdb.path=/tmp/prometheus-data \
            --web.listen-address=0.0.0.0:{{ .Values.prometheus.port }}
      ports:
        - name: prometheus
          containerPort: {{ .Values.prometheus.port }}
      resources:
        {{- toYaml .Values.prometheus.resources | nindent 8 }}

    # ========================================
    # Cloudflare Tunnel
    # ========================================
    - name: cloudflare-tunnel
      image: {{ .Values.cloudflareTunnel.image }}
      args:
        - "tunnel"
        - "--no-autoupdate"
        - "run"
        - "--token"
        - "$(TUNNEL_TOKEN)"
      env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "sandbox.fullname" . }}-secrets
              key: TUNNEL_TOKEN
              optional: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
