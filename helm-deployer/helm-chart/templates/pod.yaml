apiVersion: v1
kind: Pod
metadata:
  name: {{ include "sandbox.fullname" . }}
  labels:
    {{- include "sandbox.labels" . | nindent 4 }}
  annotations:
    # TTL-based cleanup: pod will be cleaned up after sandboxTtlSeconds
    open-inspect/created-at: {{ now | date "2006-01-02T15:04:05Z" | quote }}
    open-inspect/ttl-seconds: {{ .Values.sandboxTtlSeconds | quote }}
spec:
  # Auto-terminate after TTL expires (activeDeadlineSeconds enforces hard limit)
  activeDeadlineSeconds: {{ .Values.sandboxTtlSeconds }}
  restartPolicy: Never
  terminationGracePeriodSeconds: 30

  volumes:
    - name: workspace
      emptyDir: {}
    - name: shared-tmp
      emptyDir: {}
    - name: bridge-runtime
      configMap:
        name: {{ include "sandbox.fullname" . }}-bridge
    - name: mongodb-data
      emptyDir: {}
    - name: redis-data
      emptyDir: {}
    - name: minio-data
      emptyDir: {}
    - name: redpanda-data
      emptyDir: {}
    - name: rabbitmq-data
      emptyDir: {}

  containers:
    # ========================================
    # OpenCode Coding Agent
    # ========================================
    - name: opencode
      image: {{ .Values.opencode.image }}
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -e
          # Install OpenCode
          npm install -g opencode-ai@latest

          # Clone repo if configured
          if [ -n "$REPO_OWNER" ] && [ -n "$REPO_NAME" ]; then
            CLONE_URL="https://${VCS_CLONE_USERNAME}:${VCS_CLONE_TOKEN}@${VCS_HOST}/${REPO_OWNER}/${REPO_NAME}.git"
            git clone --depth 1 --branch "$BRANCH" "$CLONE_URL" /workspace/${REPO_NAME} || true
            cd /workspace/${REPO_NAME}
          else
            cd /workspace
          fi

          # Configure OpenCode
          export OPENCODE_CONFIG_CONTENT='{"model":"'"${PROVIDER}/${MODEL}"'","permission":{"*":{"*":"allow"}}}'
          export OPENCODE_CLIENT=serve

          # Start OpenCode server
          exec opencode serve --port ${OPENCODE_PORT} --hostname 0.0.0.0 --print-logs
      ports:
        - name: opencode
          containerPort: {{ .Values.opencode.port }}
      envFrom:
        - configMapRef:
            name: {{ include "sandbox.fullname" . }}-config
        - secretRef:
            name: {{ include "sandbox.fullname" . }}-secrets
      volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: shared-tmp
          mountPath: /tmp/shared
      resources:
        {{- toYaml .Values.opencode.resources | nindent 8 }}
      readinessProbe:
        httpGet:
          path: /global/health
          port: {{ .Values.opencode.port }}
        initialDelaySeconds: 10
        periodSeconds: 5

    # ========================================
    # Python Bridge (OpenCode -> control plane streaming)
    # ========================================
    - name: bridge
      image: {{ .Values.bridge.image }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates
          rm -rf /var/lib/apt/lists/*

          pip install --no-cache-dir \
            httpx \
            websockets \
            "pydantic>=2.0"

          exec python -m sandbox.bridge \
            --sandbox-id "$SANDBOX_ID" \
            --session-id "$SESSION_ID" \
            --control-plane "$CONTROL_PLANE_URL" \
            --token "$SANDBOX_AUTH_TOKEN" \
            --opencode-port "$OPENCODE_PORT"
      envFrom:
        - configMapRef:
            name: {{ include "sandbox.fullname" . }}-config
        - secretRef:
            name: {{ include "sandbox.fullname" . }}-secrets
      env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONPATH
          value: "/app"
      volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: bridge-runtime
          mountPath: /app/sandbox
          readOnly: true
      resources:
        {{- toYaml .Values.bridge.resources | nindent 8 }}

    # ========================================
    # Reverse Proxy (Node 22 backend/frontend)
    # ========================================
    - name: reverse-proxy
      image: {{ .Values.reverseProxy.image }}
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -e
          cat > /app/proxy.mjs << 'PROXYEOF'
          import http from "node:http";
          import { URL } from "node:url";

          const ROUTES = {
            "/opencode":    { target: `http://localhost:${process.env.OPENCODE_PORT || 4096}`, strip: "/opencode" },
            "/terminal":    { target: `http://localhost:7681`, strip: "/terminal" },
            "/browser":     { target: `http://localhost:9222`, strip: "/browser" },
            "/jaeger":      { target: `http://localhost:16686`, strip: "/jaeger" },
            "/redpanda":    { target: `http://localhost:8080`, strip: "/redpanda" },
            "/rabbitmq":    { target: `http://localhost:15672`, strip: "/rabbitmq" },
            "/maildev":     { target: `http://localhost:1080`, strip: "/maildev" },
            "/minio":       { target: `http://localhost:9001`, strip: "/minio" },
            "/prometheus":  { target: `http://localhost:9090`, strip: "/prometheus" },
          };

          function findRoute(pathname) {
            for (const [prefix, config] of Object.entries(ROUTES)) {
              if (pathname === prefix || pathname.startsWith(prefix + "/")) {
                return config;
              }
            }
            return null;
          }

          const server = http.createServer((req, res) => {
            const url = new URL(req.url, `http://localhost`);

            if (url.pathname === "/" || url.pathname === "/health") {
              res.writeHead(200, { "Content-Type": "application/json" });
              res.end(JSON.stringify({ status: "ok", sandboxId: process.env.SANDBOX_ID }));
              return;
            }

            const route = findRoute(url.pathname);
            if (!route) {
              res.writeHead(404, { "Content-Type": "application/json" });
              res.end(JSON.stringify({ error: "not found" }));
              return;
            }

            const targetPath = url.pathname.slice(route.strip.length) || "/";
            const targetUrl = route.target + targetPath + url.search;

            const proxyReq = http.request(targetUrl, {
              method: req.method,
              headers: { ...req.headers, host: new URL(route.target).host },
            }, (proxyRes) => {
              res.writeHead(proxyRes.statusCode, proxyRes.headers);
              proxyRes.pipe(res);
            });

            proxyReq.on("error", (err) => {
              res.writeHead(502, { "Content-Type": "application/json" });
              res.end(JSON.stringify({ error: "upstream error", message: err.message }));
            });

            req.pipe(proxyReq);
          });

          // WebSocket upgrade support
          server.on("upgrade", (req, socket, head) => {
            const url = new URL(req.url, `http://localhost`);
            const route = findRoute(url.pathname);
            if (!route) { socket.destroy(); return; }

            const targetPath = url.pathname.slice(route.strip.length) || "/";
            const targetUrl = new URL(route.target + targetPath + url.search);

            const proxyReq = http.request({
              hostname: targetUrl.hostname,
              port: targetUrl.port,
              path: targetUrl.pathname + targetUrl.search,
              method: "GET",
              headers: { ...req.headers, host: targetUrl.host },
            });

            proxyReq.on("upgrade", (proxyRes, proxySocket, proxyHead) => {
              socket.write(
                "HTTP/1.1 101 Switching Protocols\r\n" +
                Object.entries(proxyRes.headers).map(([k,v]) => `${k}: ${v}`).join("\r\n") +
                "\r\n\r\n"
              );
              if (proxyHead.length) socket.write(proxyHead);
              proxySocket.pipe(socket);
              socket.pipe(proxySocket);
            });

            proxyReq.on("error", () => socket.destroy());
            proxyReq.end();
          });

          const PORT = parseInt(process.env.PROXY_PORT || "3000");
          server.listen(PORT, "0.0.0.0", () => {
            console.log(`[reverse-proxy] Listening on :${PORT}`);
          });
          PROXYEOF

          exec node /app/proxy.mjs
      ports:
        - name: proxy
          containerPort: {{ .Values.reverseProxy.port }}
      envFrom:
        - configMapRef:
            name: {{ include "sandbox.fullname" . }}-config
        - secretRef:
            name: {{ include "sandbox.fullname" . }}-secrets
      env:
        - name: PROXY_PORT
          value: {{ .Values.reverseProxy.port | quote }}
      resources:
        {{- toYaml .Values.reverseProxy.resources | nindent 8 }}
      readinessProbe:
        httpGet:
          path: /health
          port: {{ .Values.reverseProxy.port }}
        initialDelaySeconds: 5
        periodSeconds: 5

    # ========================================
    # Browser for MCP (Playwright/Chromium)
    # ========================================
    - name: browser
      image: {{ .Values.browser.image }}
      command: ["/bin/bash", "-c"]
      args:
        - |
          exec chromium --headless --no-sandbox --disable-gpu \
            --remote-debugging-address=0.0.0.0 \
            --remote-debugging-port={{ .Values.browser.port }}
      ports:
        - name: browser
          containerPort: {{ .Values.browser.port }}
      resources:
        {{- toYaml .Values.browser.resources | nindent 8 }}

    # ========================================
    # ttyd — Terminal streaming in browser
    # ========================================
    - name: ttyd
      image: {{ .Values.ttyd.image }}
      command: ["ttyd"]
      args:
        - "--port"
        - {{ .Values.ttyd.port | quote }}
        - "--writable"
        - "--base-path"
        - "/terminal"
        - "bash"
      ports:
        - name: ttyd
          containerPort: {{ .Values.ttyd.port }}
      volumeMounts:
        - name: workspace
          mountPath: /workspace
      resources:
        {{- toYaml .Values.ttyd.resources | nindent 8 }}

    # ========================================
    # MongoDB
    # ========================================
    - name: mongodb
      image: {{ .Values.mongodb.image }}
      ports:
        - name: mongodb
          containerPort: {{ .Values.mongodb.port }}
      volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
      resources:
        {{- toYaml .Values.mongodb.resources | nindent 8 }}

    # ========================================
    # Jaeger (v2.x all-in-one with OTLP)
    # ========================================
    - name: jaeger
      image: {{ .Values.jaeger.image }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          cat > /tmp/jaeger-config.yml << 'EOF'
          service:
            extensions: [jaeger_storage, jaeger_query]
            pipelines:
              traces:
                receivers: [otlp]
                processors: [batch]
                exporters: [jaeger_storage_exporter]
          extensions:
            jaeger_storage:
              backends:
                mem_store:
                  memory:
                    max_traces: 100000
            jaeger_query:
              storage:
                traces: mem_store
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:{{ .Values.jaeger.ports.otlpGrpc }}
                http:
                  endpoint: 0.0.0.0:{{ .Values.jaeger.ports.otlpHttp }}
          processors:
            batch:
          exporters:
            jaeger_storage_exporter:
              trace_storage: mem_store
          EOF
          exec jaeger --config /tmp/jaeger-config.yml
      ports:
        - name: jaeger-ui
          containerPort: {{ .Values.jaeger.ports.ui }}
        - name: otlp-grpc
          containerPort: {{ .Values.jaeger.ports.otlpGrpc }}
        - name: otlp-http
          containerPort: {{ .Values.jaeger.ports.otlpHttp }}
      resources:
        {{- toYaml .Values.jaeger.resources | nindent 8 }}

    # ========================================
    # RedPanda (Kafka-compatible)
    # ========================================
    - name: redpanda
      image: {{ .Values.redpanda.image }}
      command: ["rpk"]
      args:
        - "redpanda"
        - "start"
        - "--smp=1"
        - "--memory=256M"
        - "--reserve-memory=0M"
        - "--overprovisioned"
        - "--kafka-addr=0.0.0.0:{{ .Values.redpanda.ports.kafka }}"
        - "--advertise-kafka-addr=localhost:{{ .Values.redpanda.ports.kafka }}"
        - "--pandaproxy-addr=0.0.0.0:8082"
        - "--advertise-pandaproxy-addr=localhost:8082"
        - "--schema-registry-addr=0.0.0.0:{{ .Values.redpanda.ports.schemaRegistry }}"
      ports:
        - name: kafka
          containerPort: {{ .Values.redpanda.ports.kafka }}
        - name: rp-admin
          containerPort: {{ .Values.redpanda.ports.admin }}
        - name: schema-reg
          containerPort: {{ .Values.redpanda.ports.schemaRegistry }}
      volumeMounts:
        - name: redpanda-data
          mountPath: /var/lib/redpanda/data
      resources:
        {{- toYaml .Values.redpanda.resources | nindent 8 }}

    # ========================================
    # RedPanda Console
    # ========================================
    - name: redpanda-console
      image: {{ .Values.redpandaConsole.image }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "$CONSOLE_CONFIG_FILE" > /tmp/config.yml
          exec /app/console
      ports:
        - name: rp-console
          containerPort: {{ .Values.redpandaConsole.port }}
      env:
        - name: CONSOLE_DISABLE_ENTERPRISE
          value: "true"
        - name: CONFIG_FILEPATH
          value: /tmp/config.yml
        - name: CONSOLE_CONFIG_FILE
          value: |
            kafka:
              brokers: ["localhost:{{ .Values.redpanda.ports.kafka }}"]
            schemaRegistry:
              enabled: true
              urls: ["http://localhost:{{ .Values.redpanda.ports.schemaRegistry }}"]
            kafkaConnect:
              enabled: true
              clusters:
                - name: sandbox-connect
                  url: http://localhost:{{ .Values.kafkaConnect.port }}
                  tls:
                    enabled: false
      resources:
        {{- toYaml .Values.redpandaConsole.resources | nindent 8 }}

    # ========================================
    # RabbitMQ
    # ========================================
    - name: rabbitmq
      image: {{ .Values.rabbitmq.image }}
      ports:
        - name: amqp
          containerPort: {{ .Values.rabbitmq.ports.amqp }}
        - name: rabbitmq-mgmt
          containerPort: {{ .Values.rabbitmq.ports.management }}
      volumeMounts:
        - name: rabbitmq-data
          mountPath: /var/lib/rabbitmq
      resources:
        {{- toYaml .Values.rabbitmq.resources | nindent 8 }}

    # ========================================
    # Maildev
    # ========================================
    - name: maildev
      image: {{ .Values.maildev.image }}
      ports:
        - name: smtp
          containerPort: {{ .Values.maildev.ports.smtp }}
        - name: maildev-web
          containerPort: {{ .Values.maildev.ports.web }}
      resources:
        {{- toYaml .Values.maildev.resources | nindent 8 }}

    # ========================================
    # MinIO
    # ========================================
    - name: minio
      image: {{ .Values.minio.image }}
      command: ["minio"]
      args: ["server", "/data", "--console-address", ":{{ .Values.minio.ports.console }}"]
      ports:
        - name: minio-api
          containerPort: {{ .Values.minio.ports.api }}
        - name: minio-console
          containerPort: {{ .Values.minio.ports.console }}
      env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "sandbox.fullname" . }}-secrets
              key: MINIO_ACCESS_KEY
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "sandbox.fullname" . }}-secrets
              key: MINIO_SECRET_KEY
      volumeMounts:
        - name: minio-data
          mountPath: /data
      resources:
        {{- toYaml .Values.minio.resources | nindent 8 }}

    # ========================================
    # Redis
    # ========================================
    - name: redis
      image: {{ .Values.redis.image }}
      ports:
        - name: redis
          containerPort: {{ .Values.redis.port }}
      volumeMounts:
        - name: redis-data
          mountPath: /data
      resources:
        {{- toYaml .Values.redis.resources | nindent 8 }}

    # ========================================
    # Kafka Connect
    # ========================================
    - name: kafka-connect
      image: {{ .Values.kafkaConnect.image }}
      ports:
        - name: kafka-connect
          containerPort: {{ .Values.kafkaConnect.port }}
      env:
        - name: CONNECT_BOOTSTRAP_SERVERS
          value: "localhost:{{ .Values.redpanda.ports.kafka }}"
        - name: CONNECT_REST_PORT
          value: {{ .Values.kafkaConnect.port | quote }}
        - name: CONNECT_GROUP_ID
          value: "sandbox-connect"
        - name: CONNECT_CONFIG_STORAGE_TOPIC
          value: "connect-configs"
        - name: CONNECT_OFFSET_STORAGE_TOPIC
          value: "connect-offsets"
        - name: CONNECT_STATUS_STORAGE_TOPIC
          value: "connect-status"
        - name: CONNECT_KEY_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: CONNECT_VALUE_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: CONNECT_REST_ADVERTISED_HOST_NAME
          value: "localhost"
        - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
          value: "1"
      resources:
        {{- toYaml .Values.kafkaConnect.resources | nindent 8 }}

    # ========================================
    # Prometheus
    # ========================================
    - name: prometheus
      image: {{ .Values.prometheus.image }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          cat > /tmp/prometheus.yml << 'EOF'
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: prometheus
              static_configs:
                - targets: ['localhost:{{ .Values.prometheus.port }}']
          EOF
          exec /bin/prometheus \
            --config.file=/tmp/prometheus.yml \
            --storage.tsdb.path=/tmp/prometheus-data \
            --web.listen-address=0.0.0.0:{{ .Values.prometheus.port }}
      ports:
        - name: prometheus
          containerPort: {{ .Values.prometheus.port }}
      resources:
        {{- toYaml .Values.prometheus.resources | nindent 8 }}

    # ========================================
    # Cloudflare Tunnel
    # ========================================
    - name: cloudflare-tunnel
      image: {{ .Values.cloudflareTunnel.image }}
      args:
        - "tunnel"
        - "--no-autoupdate"
        - "run"
        - "--token"
        - "$(TUNNEL_TOKEN)"
      env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "sandbox.fullname" . }}-secrets
              key: TUNNEL_TOKEN
              optional: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
